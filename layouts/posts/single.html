{{ define "content" }}
  {{ partial "sections/page-header.html" . }}

  <div class="container-fluid bg-dimmed wrapper">
    <div class="row">
      <div class="col-12 col-lg-8">
        <div class="content">
          {{ .Content }}

          {{ partial "tags.html" . }}

          {{ if not .Params.disableComments }}
            {{ partial "comments/giscus.html" . }}
          {{ end }}
        </div>
      </div>

      <div class="col-12 col-lg-4">
        {{ partial "toc.html" . }}
      </div>
    </div>
  </div>
{{ end }}
