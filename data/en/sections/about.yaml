summary: |
  I am a driven Security Analyst with a background in Modern Workplace technologies and a strong focus on Microsoft Security. As part of the MxDR team at Wortell, I use my experience and curiosity to help organizations strengthen their security posture and solve security incidents.

  I started this blog to document what I learn along the way. Writing forces me to dig deeper into technical subjects, challenge my assumptions, and validate my understanding. At the same time, I hope these write-ups help others who are working through similar problems in security, Microsoft ecosystems, or homelab environments.

  Outside of technology I enjoy spending time with my family, gaming, collecting retro games, listening to vinyl, cooking, and following basketball.

