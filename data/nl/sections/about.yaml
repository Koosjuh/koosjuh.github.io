summary: |
  Ik ben een gedreven Security Analist met een achtergrond in Modern Workplace-technologieën en een sterke focus op Microsoft Security. Als onderdeel van het MxDR-team bij Wortell gebruik ik mijn ervaring en nieuwsgierigheid om organisaties te helpen hun security-positie te versterken en security-incidenten op te lossen.

  Ik ben deze blog gestart om te documenteren wat ik onderweg leer. Door te schrijven dwing ik mezelf om dieper in technische onderwerpen te duiken, mijn aannames te testen en mijn kennis te valideren. Tegelijk hoop ik dat deze artikelen anderen helpen die met vergelijkbare vraagstukken werken binnen security, Microsoft-ecosystemen of homelab-omgevingen.

  Buiten technologie breng ik graag tijd door met mijn familie, game ik, verzamel ik retro games, luister ik naar vinyl, kook ik en volg ik basketbal.

