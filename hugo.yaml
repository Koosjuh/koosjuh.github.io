baseURL: "https://koosjuh.github.io"
languageCode: "en-us"
theme: "toha"

title: "Koos's Tech Blog"
description: "Security, Microsoft, homelab, and tech write-ups"

name: "Koos Janse"
nickname: "Koos"
image: "images/avatar.png"

module:
  imports:
    - path: github.com/hugo-toha/toha/v4
  mounts:
    - source: static/files
      target: static/files
    - source: ./node_modules/flag-icons/flags
      target: static/flags
    - source: ./node_modules/@fontsource/mulish/files
      target: static/files
    - source: ./node_modules/katex/dist/fonts
      target: static/fonts

email: "koos@koosjanse.com"
github: "Koosjuh"
linkedin: "https://www.linkedin.com/in/koosjanse"

markup:
  goldmark:
    renderer:
      unsafe: true
  tableOfContents:
    startLevel: 2
    endLevel: 6
    ordered: false

enableEmoji: true

portfolio:
  enable: true

blog:
  enable: true
  showAuthor: true
  shareButtons:
    facebook: true
    twitter: true
    linkedin: true
    reddit: true
    whatsapp: true
    email: true

notes:
  enable: true

comment:
  enable: false
  services:
    disqus:
      shortName: "toha-example-site"

analytics:
  enable: true
  services:
    google:
      id: ""

support:
  enable: false
  services:
    kofi:
      user: ""
      text: "Tip Me"
      textColor: "#f9fafc"
      backgroundColor: "#248aaa"

toc:
  enable: true

tags:
  enable: true
  on_card: true

videoPlayer:
  enable: true
  services:
    plyr: {}

copyCodeButton:
  enable: true

readingTime:
  enable: false

pagination:
  maxPostsPerPage: 12

footer:
  enable: true
  template: "footer.html"
  navigation:
    enable: true
    customMenus: true
  contactMe:
    enable: true
  credentials:
    enable: true
  disclaimer:
    enable: true
