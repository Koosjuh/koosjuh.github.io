baseURL: "https://koosjuh.github.io"
languageCode: "en-us"
title: "Koos's Tech Blog"
theme: "toha"

module:
  imports:
    - path: github.com/hugo-toha/toha/v4
  mounts:
    - source: content
      target: content
    - source: data
      target: data
    - source: layouts
      target: layouts
    - source: i18n
      target: i18n
    - source: archetypes
      target: archetypes
    - source: assets
      target: assets
    - source: static
      target: static
    - source: ./node_modules/flag-icons/flags
      target: static/flags
    - source: ./node_modules/@fontsource/mulish/files
      target: static/files
    - source: ./node_modules/katex/dist/fonts
      target: static/fonts

markup:
  goldmark:
    renderer:
      unsafe: true
  tableOfContents:
    startLevel: 2
    endLevel: 6
    ordered: false

enableEmoji: true

params:
  background: /images/background.jpg

  logo:
    main: /images/main-logo.png
    inverted: /images/main-logo.png
    favicon: /images/techblogfavicon.png

  gitRepo: https://github.com/Koosjuh/koosjuh.github.io
  gitBranch: main

  topNavbar:
    maxVisibleSections: 5

  features:
    theme:
      enable: true
      services:
        light: true
        dark: true
        default: dark

    portfolio:
      enable: true

    blog:
      enable: true
      showAuthor: true
      shareButtons:
        facebook: true
        twitter: true
        linkedin: true
        reddit: true
        whatsapp: true
        email: true

    notes:
      enable: true

    comment:
      enable: false

    analytics:
      enable: false

    support:
      enable: false

    toc:
      enable: true

    tags:
      enable: true
      on_card: true

    videoPlayer:
      enable: true
      services:
        plyr: {}

    copyCodeButton:
      enable: true

    readingTime:
      enable: false

    pagination:
      maxPostsPerPage: 12

  footer:
    enable: true
    template: footer.html
    navigation:
      enable: true
      customMenus: true
    contactMe:
      enable: true
    credentials:
      enable: true
    disclaimer:
      enable: true
